- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: yes

- name: Allow SSH (22)
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
    comment: "Allow SSH access"

- name: Allow HTTP (80)
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp
    comment: "Allow HTTP"

- name: Allow HTTPS (443)
  community.general.ufw:
    rule: allow
    port: '443'
    proto: tcp
    comment: "Allow HTTPS"

- name: Enable UFW
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming
