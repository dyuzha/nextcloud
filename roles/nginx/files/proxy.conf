# === Базовые прокси-заголовки === #

proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
# Добавляет в цепочку прокси-серверов
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
# Передает протокол, который использовал клиент (http/https)
# Без этого заголовка бекенд не узнает, что трафик шел по https
# и может, генерировать ссылки с https://
proxy_set_header X-Forwarded-Proto $scheme;


# ========== keep-alive ========== #

# Версия протокола для соединения с backend'ом
proxy_http_version 1.1;
proxy_set_header Connection "";  # для keep-alive


